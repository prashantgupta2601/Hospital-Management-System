<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors | HMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4><i class="fas fa-hospital-symbol me-2"></i> HMS PRO</h4>
        </div>
        <div class="nav flex-column mt-4">
            <a class="nav-link" href="index.html">
                <i class="fas fa-grid-2"></i> Dashboard
            </a>
            <a class="nav-link" href="patients.html">
                <i class="fas fa-user-injured"></i> Patients
            </a>
            <a class="nav-link active" href="doctors.html">
                <i class="fas fa-user-md"></i> Doctors
            </a>
            <a class="nav-link" href="appointments.html">
                <i class="fas fa-calendar-alt"></i> Appointments
            </a>
            <div class="mt-auto mb-4">
                <a class="nav-link" href="#">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="content">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid p-0">
                <button type="button" id="sidebarCollapse" class="btn border-0 d-lg-none me-3">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="ms-auto d-flex align-items-center">
                    <div id="theme-toggle" class="me-3">
                        <i class="fas fa-moon"></i>
                    </div>
                    <div class="dropdown">
                        <a class="d-flex align-items-center text-decoration-none dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=4361ee&color=fff" class="rounded-circle me-2" width="35" height="35">
                            <div class="d-none d-sm-block">
                                <p class="mb-0 text-main fw-semibold small">Alex Johnson</p>
                            </div>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg">
                            <li><a class="dropdown-item py-2" href="#"><i class="fas fa-user-circle me-2 text-muted"></i> Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item py-2 text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="container-fluid p-4 fade-in">
            <div class="row align-items-center mb-4">
                <div class="col">
                    <h3 class="fw-bold mb-1">Medical Staff</h3>
                    <p class="text-muted small mb-0">Manage your doctors and clinical staff.</p>
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary px-4 shadow-sm">
                        <i class="fas fa-plus me-2"></i> Register Doctor
                    </button>
                </div>
            </div>

            <!-- Doctors Table -->
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="doctors-table">
                        <thead>
                            <tr>
                                <th>Doctor ID</th>
                                <th>Full Name</th>
                                <th>Specialization</th>
                                <th>Email</th>
                                <th>Availability</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data loaded via JS -->
                            <tr>
                                <td colspan="6" class="text-center py-4 text-muted small">Loading medical staff...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function loadDoctors() {
            const tableBody = document.querySelector('#doctors-table tbody');
            try {
                const response = await axios.get('/doctors');
                const doctors = response.data;
                
                if (doctors.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="text-center">No doctors registered</td></tr>';
                    return;
                }

                tableBody.innerHTML = doctors.map(d => `
                    <tr>
                        <td>#${d.id}</td>
                        <td><div class="fw-bold">Dr. ${d.firstName} ${d.lastName}</div></td>
                        <td><span class="badge bg-info-soft text-info">${d.specialization}</span></td>
                        <td>${d.email}</td>
                        <td><span class="badge bg-success-soft text-success">Available</span></td>
                        <td>
                            <button class="btn btn-sm btn-light text-primary me-1"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-light text-danger"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading doctors:', error);
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Failed to load medical staff</td></tr>';
            }
        }
    </script>
</body>
</html>
