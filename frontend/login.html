<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS – Login</title>
    <meta name="description" content="Secure login portal for Hospital Management System staff and patients.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/ux-polish.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:       #3b82f6;
            --primary-dark:  #2563eb;
            --accent:        #06b6d4;
            --bg:            #0f172a;
            --surface:       #1e293b;
            --surface2:      #334155;
            --text:          #f1f5f9;
            --text-muted:    #94a3b8;
            --border:        rgba(255,255,255,0.08);
            --glass-bg:      rgba(30,41,59,0.7);
            --error:         #f87171;
            --success:       #4ade80;
            --radius:        16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* animated gradient orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            pointer-events: none;
        }
        body::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #3b82f6, transparent);
            top: -150px; left: -150px;
            animation: drift 8s ease-in-out infinite alternate;
        }
        body::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #06b6d4, transparent);
            bottom: -100px; right: -100px;
            animation: drift 10s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift {
            from { transform: translate(0, 0); }
            to   { transform: translate(30px, 30px); }
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Branding */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(59,130,246,0.35);
        }
        .brand h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .brand p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        /* Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--surface);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .25s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.4);
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            pointer-events: none;
        }
        input[type="text"], input[type="email"], input[type="password"], select {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
            appearance: none;
        }
        select { padding-left: 40px; cursor: pointer; }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        /* Toggle Password */
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            transition: color .2s;
        }
        .toggle-pw:hover { color: var(--primary); }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(59,130,246,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(59,130,246,0.45); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Alert */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 18px;
            display: none;
            align-items: flex-start;
            gap: 8px;
            animation: slideIn .2s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .alert.show { display: flex; }
        .alert-error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
        .alert-success { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }

        /* Spinner */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .card-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        /* Panels */
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <!-- Brand -->
    <div class="brand">
        <div class="brand-icon"><i class="bi bi-hospital"></i></div>
        <h1>HMS Portal</h1>
        <p>Hospital Management System</p>
    </div>

    <!-- Card -->
    <div class="card">
        <!-- Tabs -->
        <div class="tabs">
            <button id="tabLogin"    class="tab-btn active" onclick="switchTab('login')">Sign In</button>
            <button id="tabRegister" class="tab-btn"        onclick="switchTab('register')">Register</button>
        </div>

        <!-- Alert -->
        <div id="alertBox" class="alert"></div>

        <!-- ── Login Panel ── -->
        <div id="loginPanel" class="panel active">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <div class="input-wrap">
                        <i class="bi bi-person"></i>
                        <input id="loginUsername" type="text" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock"></i>
                        <input id="loginPassword" type="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-pw" onclick="togglePw('loginPassword', this)" tabindex="-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button id="loginBtn" type="submit" class="btn-submit">
                    <div id="loginSpinner" class="spinner"></div>
                    <span id="loginBtnText"><i class="bi bi-box-arrow-in-right"></i> Sign In</span>
                </button>
            </form>
        </div>

        <!-- ── Register Panel ── -->
        <div id="registerPanel" class="panel">
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <div class="input-wrap">
                        <i class="bi bi-person"></i>
                        <input id="regUsername" type="text" placeholder="Choose a username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <div class="input-wrap">
                        <i class="bi bi-envelope"></i>
                        <input id="regEmail" type="email" placeholder="your@email.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock"></i>
                        <input id="regPassword" type="password" placeholder="Min. 6 characters" required autocomplete="new-password">
                        <button type="button" class="toggle-pw" onclick="togglePw('regPassword', this)" tabindex="-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regRole">Role</label>
                    <div class="input-wrap">
                        <i class="bi bi-shield-check"></i>
                        <select id="regRole">
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                </div>
                <button id="regBtn" type="submit" class="btn-submit">
                    <div id="regSpinner" class="spinner"></div>
                    <span id="regBtnText"><i class="bi bi-person-plus"></i> Create Account</span>
                </button>
            </form>
        </div>

        <div class="card-footer">
            &copy; 2025 Hospital Management System &mdash; All rights reserved
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="services/api.js"></script>
<script src="js/ux.js"></script>
<script>
    // Redirect if already logged in
    if (AuthService.isLoggedIn()) {
        window.location.href = 'index.html';
    }

    // Modern Entrance Animations
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof gsap !== 'undefined') {
            gsap.fromTo('.brand', { y: -40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: 'power3.out' });
            gsap.fromTo('.card', { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: 'power3.out', delay: 0.15 });
        }

        // Process session expiry and inactivity notifications
        const params = new URLSearchParams(window.location.search);
        const reason = params.get('reason');
        if (reason === 'expired') {
            showAlert('Your session has expired. Please sign in again.', 'error');
        } else if (reason === 'inactive') {
            showAlert('Logged out due to 5 minutes of inactivity.', 'error');
        }
    });

    function switchTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('loginPanel').classList.toggle('active', isLogin);
        document.getElementById('registerPanel').classList.toggle('active', !isLogin);
        document.getElementById('tabLogin').classList.toggle('active', isLogin);
        document.getElementById('tabRegister').classList.toggle('active', !isLogin);
        hideAlert();
    }

    function showAlert(msg, type = 'error') {
        const box = document.getElementById('alertBox');
        box.className = `alert alert-${type} show`;
        box.innerHTML = `<i class="bi bi-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
    }
    function hideAlert() {
        document.getElementById('alertBox').className = 'alert';
    }

    function setLoading(btnId, spinnerId, textId, loading) {
        document.getElementById(btnId).disabled = loading;
        document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
        document.getElementById(textId).style.display   = loading ? 'none'  : 'flex';
    }

    function togglePw(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon  = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }

    async function handleLogin(e) {
        e.preventDefault();
        hideAlert();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        setLoading('loginBtn', 'loginSpinner', 'loginBtnText', true);
        try {
            await AuthService.login(username, password);
            showAlert('Login successful! Redirecting…', 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        } catch (err) {
            showAlert(err.message || 'Invalid username or password.');
        } finally {
            setLoading('loginBtn', 'loginSpinner', 'loginBtnText', false);
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        hideAlert();
        const username = document.getElementById('regUsername').value.trim();
        const email    = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const role     = document.getElementById('regRole').value;
        setLoading('regBtn', 'regSpinner', 'regBtnText', true);
        try {
            await AuthService.register(username, email, password, [role]);
            showAlert('Account created! You can now sign in.', 'success');
            setTimeout(() => switchTab('login'), 1200);
        } catch (err) {
            showAlert(err.message || 'Registration failed. Please try again.');
        } finally {
            setLoading('regBtn', 'regSpinner', 'regBtnText', false);
        }
    }
</script>
</body>
</html>
