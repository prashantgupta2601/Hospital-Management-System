<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors - HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header p-4">
            <h4 class="mb-0"><i class="fas fa-hospital-user me-2"></i> HMS Pro</h4>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="patients.html"><i class="fas fa-user-injured"></i> Patients</a></li>
            <li class="nav-item"><a class="nav-link active" href="doctors.html"><i class="fas fa-user-md"></i> Doctors</a></li>
            <li class="nav-item"><a class="nav-link" href="appointments.html"><i class="fas fa-calendar-check"></i> Appointments</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-file-invoice-dollar"></i> Billings</a></li>
        </ul>
    </nav>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light shadow-sm px-4">
            <div class="container-fluid">
                <button type="button" id="sidebarCollapse" class="btn btn-primary d-md-none"><i class="fas fa-align-left"></i></button>
                <div class="ms-auto d-flex align-items-center">
                    <div id="theme-toggle" class="me-3"><i class="fas fa-moon"></i></div>
                    <span class="d-none d-md-inline">Admin User</span>
                </div>
            </div>
        </nav>

        <div class="container-fluid fade-in">
            <div class="d-sm-flex align-items-center justify-content-between mb-4">
                <h1 class="h3 mb-0 text-gray-800">Doctors Management</h1>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addDoctorModal">
                    <i class="fas fa-plus me-2"></i> Add New Doctor
                </button>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="doctors-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Specialization</th>
                                    <th>Phone</th>
                                    <th>Experience</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded here via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Doctor Modal -->
    <div class="modal fade" id="addDoctorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Doctor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add-doctor-form">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" name="phone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Specialization</label>
                            <input type="text" class="form-control" name="specialization" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Experience (Years)</label>
                            <input type="number" class="form-control" name="experienceYears">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Availability</label>
                            <input type="text" class="form-control" name="availability" placeholder="e.g. Mon-Fri, 9AM-5PM">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" id="save-doctor-btn">Save Doctor</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadDoctors);

        async function loadDoctors() {
            const tableBody = document.querySelector('#doctors-table tbody');
            try {
                const response = await axios.get('/doctors');
                const doctors = response.data;
                tableBody.innerHTML = doctors.map(d => `
                    <tr>
                        <td>#${d.id}</td>
                        <td>${d.name}</td>
                        <td>${d.specialization}</td>
                        <td>${d.phone}</td>
                        <td>${d.experienceYears || 0} Years</td>
                        <td>
                            <button class="btn btn-sm btn-info text-white"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading doctors:', error);
            }
        }

        document.getElementById('save-doctor-btn').addEventListener('click', async () => {
            const form = document.getElementById('add-doctor-form');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                await axios.post('/doctors', data);
                bootstrap.Modal.getInstance(document.getElementById('addDoctorModal')).hide();
                form.reset();
                loadDoctors();
            } catch (error) {
                alert('Error adding doctor: ' + (error.response?.data?.message || error.message));
            }
        });
    </script>
</body>
</html>
