<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors | PG Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ux-polish.css">
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4><i class="fas fa-heart-pulse me-2"></i> PG CARE</h4>
        </div>
        <div class="nav flex-column mt-4">
            <a class="nav-link" href="index.html">
                <i class="fas fa-grid-2"></i> Dashboard
            </a>
            <a class="nav-link" href="patients.html">
                <i class="fas fa-user-injured"></i> Patients
            </a>
            <a class="nav-link active" href="doctors.html">
                <i class="fas fa-user-md"></i> Doctors
            </a>
            <a class="nav-link" href="appointments.html">
                <i class="fas fa-calendar-alt"></i> Appointments
            </a>
            <div class="mt-auto mb-4">
                <a class="nav-link" href="#">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="content">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid p-0">
                <button type="button" id="sidebarCollapse" class="btn border-0 d-lg-none me-3">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="ms-auto d-flex align-items-center">
                    <div id="theme-toggle" class="me-3">
                        <i class="fas fa-moon"></i>
                    </div>
                    <div class="dropdown">
                        <a class="d-flex align-items-center text-decoration-none dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=4361ee&color=fff" class="rounded-circle me-2" width="35" height="35">
                            <div class="d-none d-sm-block">
                                <p class="mb-0 text-main fw-semibold small">Alex Johnson</p>
                            </div>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg">
                            <li><a class="dropdown-item py-2" href="#"><i class="fas fa-user-circle me-2 text-muted"></i> Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item py-2 text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="container-fluid p-4 fade-in">
            <div class="row align-items-center mb-4" data-aos="slide-right">
                <div class="col">
                    <h3 class="fw-bold mb-1">Medical Staff</h3>
                    <p class="text-muted small mb-0">Manage your doctors and clinical staff.</p>
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary px-4 shadow-sm gsap-hover" data-bs-toggle="modal" data-bs-target="#addDoctorModal">
                        <i class="fas fa-plus me-2"></i> Register Doctor
                    </button>
                </div>
            </div>

            <!-- Doctors Table -->
            <div class="card gsap-card" data-aos="fade-up">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="doctors-table">
                        <thead>
                            <tr>
                                <th>Doctor ID</th>
                                <th>Full Name</th>
                                <th>Specialization</th>
                                <th>Email</th>
                                <th>Availability</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data loaded via JS -->
                            <tr>
                                <td colspan="6" class="text-center py-4 text-muted small">Loading medical staff...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Doctor Modal -->
    <div class="modal fade" id="addDoctorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Register New Doctor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addDoctorForm" onsubmit="handleAddDoctor(event)">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">First Name</label>
                                <input type="text" name="firstName" class="form-control" placeholder="Dr. John" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Last Name</label>
                                <input type="text" name="lastName" class="form-control" placeholder="Doe" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-semibold">Specialization</label>
                                <input type="text" name="specialization" class="form-control" placeholder="Cardiology" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-semibold">Email Address</label>
                                <input type="email" name="email" class="form-control" placeholder="john.doe@hospital.com" required>
                            </div>
                            <div class="col-md-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 py-2">Register Doctor</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- GSAP & AOS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script src="services/api.js"></script>
    <script src="js/ux.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="animations/animations.js"></script>
</body>
</html>
